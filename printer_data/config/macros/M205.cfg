#####################################################################
#   Klipper G-Code Overrides
#####################################################################

# https://github.com/Desuuuu/klipper-macros/blob/master/macros/M205.cfg

[gcode_macro M205]
gcode:
  {% if 'X' in params %}
    SET_VELOCITY_LIMIT SQUARE_CORNER_VELOCITY={params.X}
  {% elif 'Y' in params %}
    SET_VELOCITY_LIMIT SQUARE_CORNER_VELOCITY={params.Y}
  {% endif %}

